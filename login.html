<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login | CLASSIC-MAXIMIZE PAY</title>
<style>
  body{
    font-family: Arial, sans-serif;
    background: rgba(255, 255, 0, 0.2);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
  }
  .container{
    background: rgba(0,0,0,0.45);
    padding: 20px 30px;
    border-radius:12px;
    color:#fff;
    width: 90%;
    max-width:400px;
  }
  h2{text-align:center;}
  label{display:block;margin:10px 0 5px;}
  input{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:none;
    margin-bottom:10px;
  }
  button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#ffbf00;
    font-weight:bold;
    cursor:pointer;
  }
  p{text-align:center;margin-top:12px;}
  a{color:#ffbf00; text-decoration:none;}
</style>
</head>
<body>
<div class="container">
  <h2>Login to CLASSIC-MAXIMIZE PAY</h2>
  <label>Username</label>
  <input type="text" id="username">
  <label>Password</label>
  <input type="password" id="password">
  <button id="loginBtn">Sign In</button>
  <p><a href="forgot-password.html">Forgot Password?</a></p>
  <p>Haven't an account? <a href="register.html">Register</a></p>
</div>
<script src="./js/login.js"></script>
</body>
</html>
