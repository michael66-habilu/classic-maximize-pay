<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CLASSIC-MAXIMIZE PAY</title>
    <style>
        /* Global Styles */
        :root {
            --primary-color: #ffc107;
            --secondary-color: #2196f3;
            --dark-color: #333;
            --light-color: #f4f4f4;
            --success-color: #4caf50;
            --danger-color: #f44336;
            --warning-color: #ff9800;
            --info-color: #17a2b8;
            --milk-color: rgba(255, 255, 255, 0.8);
            --transparent-black: rgba(0, 0, 0, 0.7);
            --ocean-blue: linear-gradient(135deg, #0077b6 0%, #00b4d8 50%, #90e0ef 100%);
            --glass-effect: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            line-height: 1.6;
            color: #333;
            min-height: 100vh;
            background: var(--ocean-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="bubbles" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="20" cy="20" r="8" fill="rgba(255,255,255,0.1)"/><circle cx="60" cy="60" r="12" fill="rgba(255,255,255,0.2)"/><circle cx="80" cy="20" r="6" fill="rgba(255,255,255,0.15)"/></pattern></defs><rect width="100" height="100" fill="url(%23bubbles)"/></svg>');
            opacity: 0.2;
        }

        .container {
            width: 100%;
            max-width: 500px;
            z-index: 1;
        }

        .login-form {
            background: var(--glass-effect);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .login-form h2 {
            margin-bottom: 25px;
            text-align: center;
            color: white;
            font-size: 28px;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: white;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
            background: rgba(255, 255, 255, 0.95);
            color: #333;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(255, 193, 7, 0.2);
        }

        .btn {
            display: inline-block;
            background: var(--primary-color);
            color: #333;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
        }

        .btn:hover {
            background: #e0a800;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        .form-footer {
            text-align: center;
            margin-top: 20px;
            color: white;
        }

        .form-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .form-footer a:hover {
            color: #ffd54f;
            text-decoration: underline;
        }

        .logo {
            text-align: center;
            margin-bottom: 20px;
            color: var(--primary-color);
            font-size: 24px;
            font-weight: bold;
        }

        .forgot-link {
            display: block;
            text-align: right;
            margin-bottom: 20px;
            color: var(--primary-color);
            text-decoration: none;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .login-form {
                padding: 30px 20px;
            }
            
            body {
                padding: 15px;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="logo">
            <i class="fas fa-chart-line"></i> CLASSIC-MAXIMIZE PAY
        </div>
        
        <div class="login-form">
            <h2>Ingia Akaunti</h2>
            <form id="loginForm">
                <div class="form-group">
                    <input type="text" id="username" placeholder="Username" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="Nenosiri" required>
                </div>
                <a href="forgot.html" class="forgot-link">Umesahau nenosiri?</a>
                <button type="submit" class="btn">Ingia</button>
            </form>
            <div class="form-footer">
                <p>Huna akaunti? <a href="register.html">Jisajili hapa</a></p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('loginForm');
            
            if (loginForm) {
                loginForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    
                    const username = document.getElementById('username').value;
                    const password = document.getElementById('password').value;
                    
                    try {
                        const response = await fetch('/api/auth/login', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                username,
                                password
                            })
                        });
                        
                        const data = await response.json();
                        
                        if (response.ok && data.success) {
                            // Save token and user data
                            localStorage.setItem('token', data.token);
                            localStorage.setItem('user', JSON.stringify(data.user));
                            
                            alert('Umefanikiwa kuingia!');
                            window.location.href = 'home.html';
                        } else {
                            throw new Error(data.message || 'Imeshindikana kuingia');
                        }
                    } catch (error) {
                        console.error('Login error:', error);
                        alert('Hitilafu: ' + error.message);
                    }
                });
            }
        });
    </script>
</body>
</html>
