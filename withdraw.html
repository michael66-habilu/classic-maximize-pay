<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Withdraw | CLASSIC-MAXIMIZE PAY</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;600;700&display=swap" rel="stylesheet"/>

<style>
:root {
  --milk:#f6f4ee;
  --glass:rgba(0,0,0,0.45);
  --accent:#ffbf00;
  --text:#ffffff;
  --blue-glass:rgba(0,123,255,0.45);
}
body{
  margin:0;
  font-family:'Roboto',sans-serif;
  background:var(--milk);
  color:#111;
  padding:16px;
}
h2{text-align:center;margin-bottom:20px;font-weight:700;}

/* Back Button */
.back-btn{
  position:fixed;
  top:16px;
  left:16px;
  background:#111;
  color:#fff;
  padding:8px 12px;
  border-radius:10px;
  cursor:pointer;
  z-index:10;
}

/* Card */
.card{
  background:var(--glass);
  color:var(--text);
  padding:16px;
  border-radius:14px;
  margin-bottom:16px;
  backdrop-filter:blur(6px);
  box-shadow:0 8px 22px rgba(0,0,0,0.25);
}

/* Input fields */
label{
  display:block;
  margin:10px 0 4px;
  font-weight:600;
}
select,input{
  width:100%;
  padding:10px;
  border:1px solid #ccc;
  border-radius:10px;
  font-size:15px;
}
button{
  background:var(--accent);
  border:none;
  border-radius:10px;
  padding:12px 16px;
  font-weight:700;
  cursor:pointer;
  margin-top:12px;
  width:100%;
}

/* Popup for bank connection */
.popup{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:100;
}
.popup-content{
  background:var(--blue-glass);
  padding:20px;
  border-radius:14px;
  width:90%;
  max-width:400px;
  color:#fff;
}
.close-popup{
  float:right;
  cursor:pointer;
  font-weight:bold;
  color:red;
}

/* Edit info button */
#editInfo{
  display:none;
  margin-top:10px;
  background:#111;
  color:#fff;
}
</style>
</head>
<body>

<button class="back-btn" onclick="goBack()">&#8592; Back</button>

<h2>Withdraw</h2>

<div class="card">
  <button id="withdrawBtn">Withdraw</button>
</div>

<!-- Bank Info Popup -->
<div class="popup" id="bankPopup">
  <div class="popup-content">
    <span class="close-popup" onclick="closeBankPopup()">&times;</span>
    <h3>Connect Your Bank Account</h3>
    <p>Please fill in your bank information to withdraw.</p>

    <label for="fullName">Full Name</label>
    <input type="text" id="fullName" placeholder="Your Full Name"/>

    <label for="phone">Phone Number</label>
    <input type="text" id="phone" placeholder="07XXXXXXXX"/>

    <label for="bankName">Bank Name</label>
    <select id="bankName">
      <option value="">-- Select Bank --</option>
      <option value="MIXX BY YAS">MIXX BY YAS</option>
      <option value="AIRTEL MONEY">AIRTEL MONEY</option>
      <option value="HALOPESA">HALOPESA</option>
      <option value="M-PESA">M-PESA</option>
      <option value="CRDB">CRDB</option>
      <option value="NMB">NMB</option>
    </select>

    <button id="saveBank">Save</button>
    <button id="editInfo">View / Edit Information</button>
  </div>
</div>

<script src="./js/withdraw.js"></script>
</body>
</html>
