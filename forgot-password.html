<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password | CLASSIC-MAXIMIZE PAY</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Roboto', sans-serif;
    }

    body {
      background: rgba(255, 215, 0, 0.2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #fff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 5px 25px rgba(0, 0, 0, 0.2);
      width: 95%;
      max-width: 400px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #222;
    }

    label {
      display: block;
      font-weight: bold;
      margin-top: 10px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #ffbf00;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
      transition: 0.3s;
    }

    button:hover {
      background: #ffae00;
    }

    .links {
      text-align: center;
      margin-top: 10px;
    }

    .links a {
      color: #ff8c00;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container"><img src="https://i.postimg.cc/8CbbT7Hp/file-0000000082e86246b222f671300eafc6.png" alt="Logo"><h2>Forgot Password</h2>
    <form id="otpForm">
      <label>Username</label>
      <input type="text" id="otpUsername" placeholder="Enter your username" required />
      <button type="submit">Get OTP</button>
    </form>

    <form id="resetForm" style="display:none;">
      <label>Enter OTP</label>
      <input type="number" id="otpCode" placeholder="Enter OTP" required />

      <label>New Password</label>
      <input type="password" id="newPassword" placeholder="Enter new password" required />

      <button type="submit">Reset Password</button>
    </form>

    <div class="links">
      Remembered password? <a href="login.html">Login</a>
    </div>
  </div>

  <script src="./js/auth.js"></script>
</body>
</html>
