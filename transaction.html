<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Transaction History | CLASSIC-MAXIMIZE PAY</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;600;700&display=swap" rel="stylesheet"/>

<style>
  :root {
    --milk:#f6f4ee;
    --glass:rgba(0,0,0,0.45);
    --accent:#ffbf00;
    --text:#ffffff;
  }
  body{
    margin:0;
    font-family:'Roboto',sans-serif;
    background:var(--milk);
    color:#111;
    padding:16px;
  }
  h2{text-align:center;margin-bottom:20px;font-weight:700;}

  /* Tabs */
  .tabs{
    display:flex;
    gap:8px;
    margin-bottom:14px;
  }
  .tab{
    flex:1;
    text-align:center;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
    background:var(--accent);
    color:#111;
  }
  .tab.active{
    background:#111;
    color:#fff;
  }

  /* Tables */
  .history{
    display:none;
    background:var(--glass);
    padding:12px;
    border-radius:12px;
    backdrop-filter:blur(6px);
    color:var(--text);
  }
  table{
    width:100%;
    border-collapse:collapse;
    margin-top:8px;
  }
  th, td{
    text-align:left;
    padding:8px;
    border-bottom:1px solid rgba(255,255,255,0.25);
    font-size:14px;
  }
  th{
    font-weight:700;
  }

  /* responsive table for mobile */
  @media(max-width:600px){
    th, td{
      display:block;
      width:100%;
    }
    tr{
      margin-bottom:10px;
      border-bottom:none;
    }
  }
</style>
</head>
<body>
<h2>Transaction History</h2>

<div class="tabs">
  <div class="tab active" id="rechargeTab">Recharge History</div>
  <div class="tab" id="withdrawTab">Withdraw History</div>
</div>

<div class="history" id="rechargeHistory">
  <table>
    <thead>
      <tr>
        <th>Product / Recharge</th>
        <th>Transaction ID</th>
        <th>Date & Time</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="rechargeBody">
      <!-- Recharge rows injected by JS -->
    </tbody>
  </table>
</div>

<div class="history" id="withdrawHistory">
  <table>
    <thead>
      <tr>
        <th>Withdraw Amount</th>
        <th>Transaction ID</th>
        <th>Date & Time</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="withdrawBody">
      <!-- Withdraw rows injected by JS -->
    </tbody>
  </table>
</div>

<script src="./js/transactions.js"></script>
</body>
</html>
